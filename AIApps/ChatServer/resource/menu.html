<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leetcode 刷题助手</title>
    <style>
        /* 全局样式 - 统一设计风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            width: 900px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* 左侧插画区域 */
        .illustration-section {
            flex: 1;
            background: #E8E8E8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
            min-height: 450px;
        }

        /* 几何装饰 */
        .geo-block {
            position: absolute;
            background: #7C5CFF;
            border-radius: 20px;
        }

        .geo-block-1 {
            width: 100px;
            height: 70px;
            top: 50px;
            left: 50px;
            transform: rotate(-10deg);
        }

        .geo-block-2 {
            width: 60px;
            height: 60px;
            background: #FFB347;
            border-radius: 50%;
            bottom: 80px;
            right: 60px;
        }

        .geo-block-3 {
            width: 40px;
            height: 40px;
            background: #FFD93D;
            border-radius: 50%;
            top: 80px;
            right: 100px;
        }

        .geo-block-4 {
            width: 70px;
            height: 35px;
            background: #FF6B6B;
            border-radius: 35px 35px 0 0;
            bottom: 100px;
            left: 80px;
        }

        /* 角色 */
        .character {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-body {
            width: 80px;
            height: 110px;
            background: #2D2D2D;
            border-radius: 40px 40px 30px 30px;
            position: relative;
        }

        .character-face {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            background: #FFE4C4;
            border-radius: 50%;
        }

        .character-eyes {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .character-eye {
            width: 8px;
            height: 8px;
            background: #2D2D2D;
            border-radius: 50%;
        }

        .character-mouth {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 8px;
            border-radius: 0 0 16px 16px;
            background: #FF6B6B;
        }

        /* 右侧菜单区域 */
        .menu-section {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: #2D2D2D;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #2D2D2D;
        }

        /* 标题 */
        .main-title {
            font-size: 28px;
            font-weight: 700;
            color: #2D2D2D;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        /* 菜单按钮 */
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-option {
            display: block;
            width: 100%;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 600;
            background-color: #2D2D2D;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
        }

        .menu-option:hover {
            background-color: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .menu-option.secondary {
            background-color: #f5f5f5;
            color: #555;
            border: 1px solid #E0E0E0;
        }

        .menu-option.secondary:hover {
            background-color: #eee;
            box-shadow: none;
        }

        .menu-divider {
            height: 1px;
            background: #E0E0E0;
            margin: 8px 0;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .illustration-section {
                min-height: 200px;
                padding: 30px;
            }

            .character-body {
                width: 50px;
                height: 70px;
            }

            .character-face {
                width: 32px;
                height: 32px;
                top: 14px;
            }

            .character-eyes {
                top: 10px;
                gap: 6px;
            }

            .character-eye {
                width: 5px;
                height: 5px;
            }

            .character-mouth {
                width: 10px;
                height: 5px;
                bottom: 8px;
            }

            .menu-section {
                padding: 30px 24px;
            }

            .main-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- 左侧插画区域 -->
        <div class="illustration-section">
            <div class="geo-block geo-block-1"></div>
            <div class="geo-block geo-block-2"></div>
            <div class="geo-block geo-block-3"></div>
            <div class="geo-block geo-block-4"></div>

            <!-- 角色 -->
            <div class="character">
                <div class="character-body">
                    <div class="character-face">
                        <div class="character-eyes">
                            <div class="character-eye"></div>
                            <div class="character-eye"></div>
                        </div>
                        <div class="character-mouth"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧菜单区域 -->
        <div class="menu-section">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon"></div>
                <span class="logo-text">AI 刷题助手</span>
            </div>

            <h1 class="main-title">AI 刷题助手</h1>
            <p class="subtitle">选择您要使用的功能</p>

            <div class="menu-options">
                <a href="/leetcode" class="menu-option">进入 Leetcode 刷题助手</a>
                <div class="menu-divider"></div>
                <a href="/" class="menu-option secondary" id="logoutBtn">退出登录</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', function (e) {
            e.preventDefault();
            const userId = sessionStorage.getItem('userId');
            fetch('/user/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, type: 'manual', gameType: 0 })
            })
                .then(res => {
                    if (!res.ok) throw new Error('Logout failed');
                    sessionStorage.clear();
                    window.location.href = '/';
                })
                .catch(() => alert('退出登录失败！'));
        });
    </script>
</body>

</html>

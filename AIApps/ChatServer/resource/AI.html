<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天助手</title>
    <style>
        /* 全局样式 - 统一设计风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            max-height: 90vh;
            background: #ffffff;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* 左侧会话列表 */
        .session-list {
            width: 280px;
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #E0E0E0;
        }

        .session-list-header {
            padding: 24px 20px;
            text-align: center;
            font-weight: 600;
            background: #fff;
            border-bottom: 1px solid #E0E0E0;
            font-size: 16px;
            color: #2D2D2D;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 0;
            margin-top: 16px;
            cursor: pointer;
            background: #2D2D2D;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .session-list ul {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }

        .session-list li {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            transition: all 0.2s;
            font-size: 14px;
            color: #555;
        }

        .session-list li.active {
            background: #2D2D2D;
            color: #fff;
            font-weight: 500;
        }

        .session-list li:hover:not(.active) {
            background: #f0f0f0;
        }

        /* 右侧聊天区 */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .top-bar {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: #fff;
            border-bottom: 1px solid #E0E0E0;
        }

        .back-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: #f5f5f5;
            color: #555;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #eee;
        }

        .sync-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background: #f5f5f5;
            color: #555;
            transition: all 0.3s;
        }

        .sync-btn:hover {
            background: #eee;
        }

        .top-bar label {
            font-size: 14px;
            color: #888;
            margin-left: auto;
        }

        .model-select {
            padding: 8px 12px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            color: #2D2D2D;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
        }

        .message {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        .user {
            background: #2D2D2D;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            background: #fff;
            color: #2D2D2D;
            align-self: flex-start;
            border: 1px solid #E0E0E0;
            border-bottom-left-radius: 4px;
        }

        .message-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .message-label {
            font-weight: 600;
            font-size: 13px;
            opacity: 0.8;
            flex-shrink: 0;
        }

        .tts-btn {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            background: #f5f5f5;
            color: #555;
            border: 1px solid #E0E0E0;
            transition: all 0.2s;
            margin-left: auto;
            flex-shrink: 0;
        }

        .tts-btn:hover {
            background: #eee;
        }

        .input-box {
            display: flex;
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid #E0E0E0;
            gap: 12px;
        }

        textarea {
            flex: 1;
            resize: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            outline: none;
            border: 1px solid #E0E0E0;
            background: #f8f8f8;
            color: #2D2D2D;
            transition: all 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: #2D2D2D;
            background: #fff;
        }

        textarea::placeholder {
            color: #AAA;
        }

        .send-btn {
            padding: 0 24px;
            border: none;
            border-radius: 12px;
            background: #2D2D2D;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
</head>

<body>
    <div class="main-container">
        <div class="session-list">
            <div class="session-list-header">
                会话列表
                <button class="new-chat-btn" id="newChatBtn">+ 新聊天</button>
            </div>
            <ul id="sessionList"></ul>
        </div>

        <div class="chat-section">
            <div class="top-bar">
                <button class="back-btn" onclick="window.location.href='/menu'">← 返回</button>
                <button class="sync-btn" id="sync-history-btn">同步历史数据</button>
                <label for="modelType">选择模型：</label>
                <select id="modelType" class="model-select">
                    <option value="1" selected>阿里百炼</option>
                    <option value="2">豆包</option>
                    <option value="3">百炼RAG</option>
                    <option value="4">阿里百炼MCP</option>
                </select>
            </div>

            <div class="chat-container" id="chat-container"></div>

            <form class="input-box" id="chat-form">
                <textarea id="question" placeholder="请输入你的问题..." required></textarea>
                <button type="submit" class="send-btn">发送</button>
            </form>
        </div>
    </div>

    <script>
        let currentSessionId = null, tempSession = false;
        const sessions = {};
        const sessionList = document.getElementById('sessionList');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const questionInput = document.getElementById('question');
        const syncBtn = document.getElementById('sync-history-btn');
        const modelTypeSelect = document.getElementById('modelType');
        const newChatBtn = document.getElementById('newChatBtn');

        async function playTTS(text) {
            try {
                const res = await fetch('/chat/tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
                const data = await res.json();
                if (data.success && data.url) { const audio = new Audio(data.url); audio.play(); }
                else alert('[错误] 无法获取语音');
            } catch (err) { console.error(err); alert('[错误] 请求语音接口失败'); }
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            const safeHtml = DOMPurify.sanitize(marked.parse(content));
            const escapedContent = content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
            msgDiv.innerHTML = `<div class="message-content"><span class="message-label">${role === 'user' ? '你' : 'AI'}:</span><div style="flex:1;">${safeHtml}</div><button class="tts-btn" onclick="playTTS(\`${escapedContent}\`)">🔊</button></div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearMessages() { chatContainer.innerHTML = ''; }

        function renderSessionList() {
            sessionList.innerHTML = '';
            for (let id in sessions) {
                const li = document.createElement('li');
                li.textContent = sessions[id].name || `会话 ${id}`;
                li.dataset.id = id;
                if (id === currentSessionId) li.classList.add('active');
                li.onclick = () => switchSession(id);
                sessionList.appendChild(li);
            }
        }

        async function switchSession(id) {
            currentSessionId = String(id); tempSession = false; clearMessages();
            if (!sessions[id].messages || sessions[id].messages.length === 0) {
                try {
                    const res = await fetch('/chat/history', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionId: currentSessionId }) });
                    const data = await res.json();
                    if (data.success && Array.isArray(data.history)) {
                        sessions[id].messages = [];
                        data.history.forEach(item => { sessions[id].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content }); });
                    }
                } catch (err) { console.error('获取历史失败', err); }
            }
            sessions[id].messages.forEach(m => appendMessage(m.role, m.content));
            renderSessionList();
        }

        newChatBtn.addEventListener('click', () => {
            currentSessionId = 'temp';
            tempSession = true;
            clearMessages();
        });

        chatForm.addEventListener('submit', async e => {
            e.preventDefault();
            const question = questionInput.value.trim();
            if (!question) return;

            appendMessage('user', question);

            if (tempSession) {
                try {
                    const response = await fetch('/chat/send-new-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, modelType: modelTypeSelect.value })
                    });
                    const data = await response.json();
                    if (data.success) {
                        const sessionId = String(data.sessionId);
                        sessions[sessionId] = {
                            name: '新会话',
                            messages: [
                                { role: 'user', content: question },
                                { role: 'assistant', content: data.Information }
                            ]
                        };
                        currentSessionId = sessionId;
                        tempSession = false;
                        renderSessionList();
                        appendMessage('assistant', data.Information);
                    } else {
                        appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) {
                    console.error(err);
                    appendMessage('assistant', '[错误] 无法连接到服务器');
                }
            } else {
                sessions[currentSessionId].messages.push({ role: 'user', content: question });
                try {
                    const response = await fetch('/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ question, modelType: modelTypeSelect.value, sessionId: currentSessionId })
                    });
                    const data = await response.json();
                    if (data.success) {
                        appendMessage('assistant', data.Information);
                        sessions[currentSessionId].messages.push({ role: 'assistant', content: data.Information });
                    } else {
                        appendMessage('assistant', '[错误] ' + (data.message || '未知错误'));
                    }
                } catch (err) {
                    console.error(err);
                    appendMessage('assistant', '[错误] 无法连接到服务器');
                }
            }

            questionInput.value = '';
        });

        syncBtn.addEventListener('click', async () => {
            if (!currentSessionId || tempSession) {
                alert('请选择已有会话进行同步');
                return;
            }
            try {
                const res = await fetch('/chat/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: currentSessionId })
                });
                const data = await res.json();
                if (data.success && Array.isArray(data.history)) {
                    sessions[currentSessionId].messages = [];
                    clearMessages();
                    data.history.forEach(item => {
                        appendMessage(item.is_user ? 'user' : 'assistant', item.content);
                        sessions[currentSessionId].messages.push({ role: item.is_user ? 'user' : 'assistant', content: item.content });
                    });
                } else {
                    alert('[错误] 无法获取历史数据');
                }
            } catch (err) {
                console.error(err);
                alert('[错误] 请求历史数据失败');
            }
        });

        async function loadSessions() {
            try {
                const res = await fetch('/chat/sessions');
                const data = await res.json();
                if (data.success && Array.isArray(data.sessions)) {
                    data.sessions.forEach(s => {
                        const sid = String(s.sessionId);
                        sessions[sid] = { name: s.name || `会话 ${sid}`, messages: [] };
                    });
                    renderSessionList();
                }
            } catch (err) {
                console.error('获取会话列表失败', err);
            }
        }

        loadSessions();
    </script>
</body>

</html>
